name: CI

on:
  pull_request:

jobs:
  ci:
    # Run the suite on Linux AND Windows. Windows-specific breakage (CRLF
    # checkout, cp1252 stdio, POSIX-vs-Windows paths) used to slip through a
    # Linux-only CI; this matrix locks in the cross-platform fixes.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Build core
        run: pnpm --filter @understand-anything/core build

      - name: Build skill
        run: pnpm --filter @understand-anything/skill build

      - name: Test core
        run: pnpm --filter @understand-anything/core test

      - name: Test skill
        run: pnpm test
